name: Mobile Build (Gradle, no EAS)

# Builds the Android release .aab entirely on the GitHub runner with gradle —
# NO EAS / eas.dev cloud build. The compile (prebuild + gradle + NDK + Hermes)
# happens here; the artifact is downloadable from the run.
#
# HOW IT RUNS
#   * tag push:  push a tag like `mobile-gradle-v4`  → builds versionCode 4.
#                The trailing integer in the tag IS the versionCode.
#   * manual:    Actions tab → this workflow → Run workflow → set `versionCode`.
#                (workflow_dispatch is only available once this file is on the
#                 default branch; the tag path works from any branch.)
#
# Tag prefix `mobile-gradle-v*` deliberately does NOT match docker.yml's `v*`
# filter (that matches tags STARTING with `v`), so the Docker pipeline stays put.
#
# SIGNING (optional but required for a Play-uploadable build)
#   With the 4 secrets below the release bundle is signed with the EXISTING EAS
#   upload key (so Play accepts the upload and the password-autofill assetlinks
#   fingerprint stays valid). WITHOUT them, the workflow still runs and produces
#   a DEBUG-SIGNED .aab for pipeline validation only — NOT uploadable to Play.
#   Export the keystore from EAS:  cd mobile && eas credentials -p android →
#   production → Keystore → Download (prints alias + passwords), then add:
#     ANDROID_UPLOAD_KEYSTORE_BASE64  base64 of the .jks  (`base64 -w0 file.jks`)
#     ANDROID_KEYSTORE_PASSWORD       keystore (store) password
#     ANDROID_KEY_ALIAS               key alias
#     ANDROID_KEY_PASSWORD            key password
#   under Settings → Secrets and variables → Actions.
#
# PUBLISH TO GOOGLE PLAY (optional — off unless explicitly requested)
#   After a Play-signed build, the workflow can push the .aab straight to the
#   Play Developer API (no manual Play Console upload). Two ways to trigger it:
#     * tag push:  push `mobile-release-v<N>` (instead of `mobile-gradle-v<N>`)
#                  → builds versionCode N AND publishes. Track comes from the
#                  repo variable PLAY_TRACK (default `internal`). The plain
#                  `mobile-gradle-v<N>` tag still builds ONLY (never publishes).
#     * manual:    Actions tab → Run workflow → set `playTrack` (only selectable
#                  once this file is on the default branch — see note above).
#   Requires, in addition to the 4 signing secrets:
#     PLAY_SERVICE_ACCOUNT_JSON   full JSON key of a Google Cloud service account
#                                 linked under Play Console → Setup → API access,
#                                 granted "Release apps to testing tracks" (and
#                                 "Release to production" if publishing prod).
#   Optional repo variable (Settings → Secrets and variables → Actions → Variables):
#     PLAY_TRACK                  track for the mobile-release-v* tag path.
#                                 internal | alpha (closed) | beta (open) |
#                                 production. Defaults to `internal`.
#   The app must have had >=1 manual upload already (it has — versionCode 2).
#   A personal Play account must finish closed testing before `production` is
#   accepted; the API will reject a premature production publish.

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: Android versionCode (must be greater than the last uploaded build)
        type: string
        required: true
      playTrack:
        description: Publish to this Play track after build (none = build only)
        type: choice
        options: [none, internal, alpha, beta, production]
        default: none
      releaseStatus:
        description: Play release status (completed = live to that track; draft = staged)
        type: choice
        options: [completed, draft]
        default: completed
  push:
    # mobile-gradle-v*  → build only.   mobile-release-v* → build AND publish.
    tags: ['mobile-gradle-v*', 'mobile-release-v*']

concurrency:
  group: mobile-build-gradle-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Gradle bundleRelease
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve versionCode
        id: ver
        env:
          INPUT_VC: ${{ github.event.inputs.versionCode }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VC="$INPUT_VC"
          # Tag pushes carry no inputs — take the trailing integer of the tag
          # (mobile-gradle-v4 → 4).
          if [ -z "$VC" ]; then VC="$(printf '%s' "$REF_NAME" | grep -oE '[0-9]+$' || true)"; fi
          if [ -z "$VC" ]; then
            echo "::error::Could not determine versionCode. Tag like 'mobile-gradle-v4' or pass the versionCode input."
            exit 1
          fi
          echo "Building versionCode $VC"
          echo "versionCode=$VC" >> "$GITHUB_OUTPUT"

      - name: Detect signing secrets
        id: signing
        env:
          KS: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Upload keystore present — release bundle will be signed for Play."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_UPLOAD_KEYSTORE_BASE64 secret — building a DEBUG-SIGNED .aab for validation only (NOT uploadable to Play)."
          fi

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set versionCode in app.json
        env:
          VC: ${{ steps.ver.outputs.versionCode }}
        run: |
          node -e "const fs=require('fs');const p='app.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.expo.android=j.expo.android||{};j.expo.android.versionCode=Number(process.env.VC);fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('versionCode set to',j.expo.android.versionCode);"

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --no-install

      - name: Disable release-lint gate (match EAS)
        working-directory: mobile/android
        run: |
          # AGP's lintVitalRelease aborts the release build on fatal lint issues
          # in third-party modules (:expo, :react-native-screens). EAS Build does
          # not gate on this; disable checkReleaseBuilds on the app module so the
          # whole lintVital* chain is skipped during bundleRelease.
          node -e "const fs=require('fs');const p='app/build.gradle';let s=fs.readFileSync(p,'utf8');if(!/checkReleaseBuilds\s+false/.test(s)){s=s.replace(/android\s*\{/, m=>m+'\n    lint {\n        checkReleaseBuilds false\n        abortOnError false\n    }');fs.writeFileSync(p,s);console.log('Injected lint{} disable into app/build.gradle');}else{console.log('lint disable already present');}"

      - name: Decode upload keystore
        if: steps.signing.outputs.available == 'true'
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          echo "Keystore decoded ($(wc -c < "$RUNNER_TEMP/upload.keystore") bytes)"

      - name: Gradle bundleRelease + assembleRelease
        working-directory: mobile/android
        env:
          SIGNED: ${{ steps.signing.outputs.available }}
          KSPW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYPW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          # bundleRelease → .aab (Play upload); assembleRelease → .apk (sideload).
          if [ "$SIGNED" = "true" ]; then
            ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file="$RUNNER_TEMP/upload.keystore" \
              -Pandroid.injected.signing.store.password="$KSPW" \
              -Pandroid.injected.signing.key.alias="$ALIAS" \
              -Pandroid.injected.signing.key.password="$KEYPW"
          else
            echo "::warning::Building DEBUG-SIGNED artifacts (no upload keystore) — validation only, NOT uploadable to Play."
            ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon --stacktrace
          fi

      - name: Upload .aab artifact (Play upload)
        uses: actions/upload-artifact@v7
        with:
          name: finlynq-vc${{ steps.ver.outputs.versionCode }}-${{ steps.signing.outputs.available == 'true' && 'release' || 'DEBUGSIGNED' }}-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload .apk artifact (sideload)
        uses: actions/upload-artifact@v7
        with:
          name: finlynq-vc${{ steps.ver.outputs.versionCode }}-${{ steps.signing.outputs.available == 'true' && 'release' || 'DEBUGSIGNED' }}-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Decide whether to publish to Play
        id: publish
        env:
          REF_NAME: ${{ github.ref_name }}
          TRACK_INPUT: ${{ github.event.inputs.playTrack }}
          STATUS_INPUT: ${{ github.event.inputs.releaseStatus }}
          TRACK_VAR: ${{ vars.PLAY_TRACK }}
          SIGNED: ${{ steps.signing.outputs.available }}
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          TRACK="none"
          STATUS="${STATUS_INPUT:-completed}"
          # Manual dispatch with an explicit track wins.
          if [ -n "$TRACK_INPUT" ] && [ "$TRACK_INPUT" != "none" ]; then
            TRACK="$TRACK_INPUT"
          # A `mobile-release-v*` tag publishes; track from PLAY_TRACK var (default internal).
          elif printf '%s' "$REF_NAME" | grep -q '^mobile-release-v'; then
            TRACK="${TRACK_VAR:-internal}"
          fi
          SHOULD="false"
          if [ "$TRACK" = "none" ]; then
            echo "Build only — not publishing. (Use a 'mobile-release-v<N>' tag or the playTrack input to publish.)"
          elif [ "$SIGNED" != "true" ]; then
            echo "::error::Publish to '$TRACK' requested but the build is NOT Play-signed (missing ANDROID_UPLOAD_KEYSTORE_BASE64)."
            exit 1
          elif [ -z "$SA_JSON" ]; then
            echo "::error::Publish to '$TRACK' requested but PLAY_SERVICE_ACCOUNT_JSON secret is missing."
            exit 1
          else
            SHOULD="true"
            echo "Will publish to Play track '$TRACK' (status '$STATUS')."
          fi
          echo "should_publish=$SHOULD" >> "$GITHUB_OUTPUT"
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Publish .aab to Google Play
        if: steps.publish.outputs.should_publish == 'true'
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.finlynq.mobile
          releaseFiles: mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.publish.outputs.track }}
          status: ${{ steps.publish.outputs.status }}
